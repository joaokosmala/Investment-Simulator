<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Investment Simulator</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

    <h1>📈 Investment Simulator - By @kolzzdev</h1>

    <div class="form">

        <div class="input-group">
            <label>Capital Inicial (R$)</label>
            <input type="number" id="capital" value="10000">
        </div>

        <div class="input-group">
            <label>Aporte Mensal (R$)</label>
            <input type="number" id="aporte" value="500">
        </div>

        <div class="input-group">
            <label>Taxa de Juros (% ao mês)</label>
            <input type="number" step="0.01" id="taxa" value="1">
        </div>

        <div class="input-group">
            <label>Prazo (Meses)</label>
            <input type="number" id="meses" value="24">
        </div>

        <button onclick="calcular()">
            Calcular
        </button>

    </div>

    <div class="results">

        <div class="card">
            <h3>Valor Investido</h3>
            <p id="investido">R$ 0,00</p>
        </div>

        <div class="card">
            <h3>Juros Obtidos</h3>
            <p id="juros">R$ 0,00</p>
        </div>

        <div class="card">
            <h3>Montante Final</h3>
            <p id="montante">R$ 0,00</p>
        </div>

    </div>

    <div class="chart-container">
        <canvas id="grafico"></canvas>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
